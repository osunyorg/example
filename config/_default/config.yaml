theme: 
  - osuny-plugin-reading-progress
  - osuny
  - osuny-plugin-pagedjs
  # - osuny-plugin-centered-header
  # - osuny-plugin-centered-footer
  # - osuny-plugin-centered-layout
_merge: deep
params:
  debug:
    active: true
    productionUrl: https://example.osuny.org
  logo:
    header:
      default: "/assets/images/logo-osuny.svg"
      darkmode: "/assets/images/logo-osuny-white.svg"
    footer:
      default: "/assets/images/logo-osuny.svg"
      darkmode: "/assets/images/logo-osuny-white.svg"
  default:
    index:
      search:
        active: true
    # single:
    #   meta:
    #     position: hero
  search:
    active: true
    max_results: 20
    positions:
      - primary
      - footer
  events:
    index:
      options:
        place: true
  organizations:
    single:
      backlinks: true
  pages:
    index:
      options:
        categories: true
  persons:
    index: 
      layout: list # grid | list
    single:
      backlinks: true
      taxonomies:
        position: content
  diplomas:
    single:
      programs:
        layout: list
        options:
          image: false
          summary: true