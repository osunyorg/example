{{ define "main" }}
  {{ partial "pages/single/hero.html" . }}

  <div class="document-content">
    {{ partial "toc/container.html" (dict
      "toc" ( partial "pages/single/toc.html" . )
      "context" .
    ) }}

    {{ partial "pages/single/summary.html" (dict
      "context" .
      "block_wrapped" true
    ) }}

    <div class="container">
      <div class="button">
        <span>
          button
        </span>
      </div>
      <div class="button-alt">
        <span>
          bouton alt
        </span>
      </div>
      <div class="button-accent">
        <span>
          bouton accent
        </span>
      </div>
    </div>
  </div>

{{ end }}
